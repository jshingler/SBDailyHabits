# GitHub Actions CI pipeline for SBDailyHabits.
#
# This workflow has two jobs:
#
#   test-and-lint — runs on every push/PR to main:
#     1. cargo test with coverage instrumentation (cargo-llvm-cov)
#     2. cargo clippy — Rust linter, zero warnings allowed
#     3. Uploads an HTML coverage report as a downloadable artifact
#
#   release — runs only when a version tag (e.g. v1.2.3) is pushed:
#     1. Requires test-and-lint to pass first
#     2. Builds a release binary with `cargo build --release`
#     3. Creates a GitHub Release and attaches the binary as an asset
#
# To publish a release:
#   git tag v1.0.0 && git push origin v1.0.0

name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code into the runner VM.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install the Rust toolchain with clippy (linter) and llvm-tools-preview
      # (required by cargo-llvm-cov to instrument code for coverage).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      # Cache cargo's registry and compiled dependencies between runs.
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Install OpenSSL dev headers — required by the `openssl-sys` crate
      # which is a transitive dependency of `reqwest`.
      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # cargo-llvm-cov is the coverage tool. It wraps `cargo test` and uses
      # LLVM's built-in instrumentation to measure which lines were executed.
      # `--locked` ensures the installed version matches the current toolchain.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Run all tests under coverage instrumentation and emit an HTML report.
      # The report is written to target/llvm-cov/html/ — one page per source
      # file showing covered (green) and uncovered (red) lines.
      - name: Run tests with coverage
        run: cargo llvm-cov --html
        env:
          RUST_LOG: info

      # Upload the HTML coverage report so it's downloadable from the
      # GitHub Actions run page for 30 days. Click the run, scroll to
      # "Artifacts", download coverage-report.zip and open index.html.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30

      # Run clippy — Rust's official linter. `-D warnings` makes it fail the
      # build if it finds anything, preventing lint debt from building up.
      - name: Run clippy
        run: cargo clippy -- -D warnings

  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run this job when a version tag is pushed, and only after
    # test-and-lint passes. This guarantees releases always pass tests.
    needs: test-and-lint
    if: startsWith(github.ref, 'refs/tags/v')
    # `write` permission is required for `gh release create` to create
    # a GitHub Release and upload assets.
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      # `--release` enables full compiler optimizations. The binary is ~10x
      # smaller and faster than a debug build. Output: target/release/sb-daily-habits
      - name: Build release binary
        run: cargo build --release

      # Rename the binary to include the platform so users know what they downloaded.
      - name: Rename binary for release
        run: cp target/release/sb-daily-habits sb-daily-habits-linux-x86_64

      # Create a GitHub Release for this tag and attach the binary.
      # `gh release create` is the GitHub CLI — it's pre-installed on all
      # GitHub-hosted runners. The tag name is available as github.ref_name.
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            sb-daily-habits-linux-x86_64 \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
